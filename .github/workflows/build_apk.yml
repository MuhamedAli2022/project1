name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project File
        run: |
          sudo apt-get install unzip
          unzip poultrypro_egypt.zip -d ./extracted_project
          
          PUBSPEC_PATH=$(find ./extracted_project -name "pubspec.yaml" -print -quit)
          if [ -n "$PUBSPEC_PATH" ]; then
            PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
            cp -r "$PROJECT_DIR"/* . || true
          else
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Recreate Android Project Files
        run: |
          rm -rf android
          flutter create . --platforms=android

      - name: Auto Upgrade All Dependencies
        run: |
          # التحديث الذكي والآمن لكل المكتبات التالفة والقديمة دفعة واحدة
          flutter pub upgrade --major-versions

      - name: Auto Fix Copilot Code Errors
        run: |
          # إصلاح مسميات الأيقونات الخاطئة التي كتبها كوبايلوت
          find . -name "*.dart" -exec sed -i 's/Icons.virus_lock/Icons.security/g' {} +
          find . -name "*.dart" -exec sed -i 's/Icons.medicine/Icons.medical_services/g' {} +
          
          # إصلاح مسميات حركات الأنميشن غير المتوافقة
          find . -name "*.dart" -exec sed -i 's/\.slideUp(/.slide(/g' {} +
          find . -name "*.dart" -exec sed -i 's/\.slideInRight(/.slide(/g' {} +
          find . -name "*.dart" -exec sed -i 's/\.slideUp()/.slide()/g' {} +
          find . -name "*.dart" -exec sed -i 's/\.slideInRight()/.slide()/g' {} +
          
          # إزالة السطر المسبب للمشكلة في الـ BoxDecoration
          find . -name "animated_widgets.dart" -exec sed -i '/backdropFilter:/d' {} +

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project File
        run: |
          sudo apt-get install unzip
          unzip poultrypro_egypt.zip -d ./extracted_project
          
          # البحث عن مكان ملف pubspec.yaml ونقل محتوياته للمجلد الرئيسي
          PUBSPEC_PATH=$(find ./extracted_project -name "pubspec.yaml" -print -quit)
          if [ -n "$PUBSPEC_PATH" ]; then
            PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
            cp -r "$PROJECT_DIR"/* . || true
            echo "Project files moved successfully from $PROJECT_DIR"
          else
            echo "Error: pubspec.yaml not found inside the ZIP!"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

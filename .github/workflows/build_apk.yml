name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project File
        run: |
          sudo apt-get install unzip
          unzip poultrypro_egypt.zip -d ./extracted_project
          
          PUBSPEC_PATH=$(find ./extracted_project -name "pubspec.yaml" -print -quit)
          if [ -n "$PUBSPEC_PATH" ]; then
            PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
            cp -r "$PROJECT_DIR"/* . || true
          else
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Fix Dependencies Versions
        run: |
          # استبدال المكتبات القديمة بأحدث إصدارات متوافقة لحل مشاكل الأكواد تلقائياً
          sed -i 's/glass: ^0.2.1/glass: ^2.0.0+2/g' pubspec.yaml
          sed -i "s/glass: '^0.2.1'/glass: '^2.0.0+2'/g" pubspec.yaml
          flutter pub add font_awesome_flutter:latest
          flutter pub add flutter_animate:latest

      - name: Recreate Android Project Files
        run: |
          rm -rf android
          flutter create . --platforms=android

      - name: Auto Fix Copilot Code Errors
        run: |
          # إصلاح مسميات الأيقونات الخاطئة التي اقترحها كوبايلوت داخل الملفات
          find . -name "*.dart" -exec sed -i 's/Icons.virus_lock/Icons.security/g' {} +
          find . -name "*.dart" -exec sed -i 's/Icons.medicine/Icons.medical_services/g' {} +
          
          # إصلاح أخطاء حركات الأنميشن غير الموجودة وتحويلها لحركات قياسية
          find . -name "*.dart" -exec sed -i 's/\.slideUp(/.slide(/g' {} +
          find . -name "*.dart" -exec sed -i 's/\.slideInRight(/.slide(/g' {} +
          find . -name "*.dart" -exec sed -i 's/\.slideUp()/.slide()/g' {} +
          find . -name "*.dart" -exec sed -i 's/\.slideInRight()/.slide()/g' {} +
          
          # إزالة السطر التالف الخاص بالـ backdropFilter من الويدجت المشبوه
          find . -name "animated_widgets.dart" -exec sed -i '/backdropFilter:/d' {} +

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
